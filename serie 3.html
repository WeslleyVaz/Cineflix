<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Filme - Página de Exibição</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #141414;
      color: white;
    }

    .container {
      display: flex;
      padding: 40px;
    }

    .capa {
      width: 300px;
    }

    .capa img {
      width: 100%;
      border-radius: 10px;
    }

    .info {
      margin-left: 40px;
      max-width: 600px;
    }

    h1 {
      margin-top: 0;
    }

    .botoes {
      margin: 20px 0;
    }

    button {
      padding: 12px 20px;
      margin-right: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .assistir {
      background-color: red;
      color: white;
    }

    .trailer {
      background-color: gray;
      color: white;
    }

    iframe {
      margin-top: 20px;
      border-radius: 10px;
    }

    .resenha {
      margin-top: 20px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="capa">
      <img src="game.jpg" alt="Capa do Filme">
    </div>

    <div class="card drama">
      <h1>Cavalheiro das trevas</h1>
      <p><strong>Gênero:</strong> Drama</p>
      <p><strong>Ano:</strong> 2011</p>

      <div class="botoes">
        <button id="btnassistir" class="assistir">▶ Assistir</button>
        <button class="trailer" onclick="mostrarTrailer()">Ver Trailer</button>
      </div>

      <div id="areaTrailer" style="display:none;">
        <iframe width="560" height="315"
          src="Game of Thrones  Official Series Trailer (HBO) - GameofThrones (720p, h264, youtube).mp4"
          title="Trailer"
          frameborder="0"
          allowfullscreen>
        </iframe>
      </div>

      <div class="resenha">
        <h3>Sinopse</h3>
        <p>
          Um professor de química com câncer decide fabricar metanfetamina para deixar dinheiro para a família, entrando cada vez mais fundo no crime.
        </p>
      </div>

    </div>
  </div>

  <script>
    function mostrarTrailer() {
      var trailer = document.getElementById("areaTrailer");
      trailer.style.display = "block";
    }
  </script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/script.js"></script>
</body>
</html>
