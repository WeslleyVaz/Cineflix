    <style>
        body {
            background-color: #000133;
            color: rgb(255, 255, 255);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            padding: 20px;
        }

        .titulo {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .carrossel {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .carrossel::-webkit-scrollbar {
            display: none;
           
        }

        .item {
            position: relative;
            min-width: 200px;
            height: 300px;
            border-radius: 5px;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item:hover {
            transform: scale(1.1);
            cursor: pointer;
            z-index: 10;
        }

        .item .titulo-filme {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 5px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            text-align: center;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .item:hover .titulo-filme {
            opacity: 1;
        }

    


    </style>
    </head>

    <body>

        <div class="container">
            <div class="titulo">Populares</div>

                    </div>

                </div>

                    </div>
                </div>
                <div class="item Comedia">

                    </a>

                </div>
            </div>
        </div>
