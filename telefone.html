<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Filme - Página de Exibição</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #141414;
      color: white;
    }

    .container {
      display: flex;
      padding: 40px;
    }

    .capa {
      width: 300px;
    }

    .capa img {
      width: 100%;
      border-radius: 10px;
    }

    .info {
      margin-left: 40px;
      max-width: 600px;
    }

    h1 {
      margin-top: 0;
    }

    .botoes {
      margin: 20px 0;
    }

    button {
      padding: 12px 20px;
      margin-right: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .assistir {
      background-color: red;
      color: white;
    }

    .trailer {
      background-color: gray;
      color: white;
    }

    iframe {
      margin-top: 20px;
      border-radius: 10px;
    }

    .resenha {
      margin-top: 20px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Capa do filme -->
    <div class="capa">
      <img src="tele.jpg" alt="Capa do Filme">
    </div>

    <!-- Informações -->
    <div class="Terror">
      <h1>O Telefone Preto</h1>
      <p><strong>Gênero:</strong> Terror</p>
      <p><strong>Ano:</strong> 2021</p>

      <div class="botoes">
        <button class="assistir">▶ Assistir</button>
        <button class="trailer" onclick="mostrarTrailer()">Ver Trailer</button>
      </div>

      <!-- Trailer -->
      <div id="areaTrailer" style="display:none;">
        <iframe width="560" height="315"
          src="O Telefone Preto  Trailer Oficial DUBLADO (Universal Pictures) HD - Universal Pictures Brasil (720p, h264, youtube).mp4"
          title="Trailer"
          frameborder="0"
          allowfullscreen>
        </iframe>
      </div>

      <!-- Resenha -->
      <div class="resenha">
        <h3>Sinopse</h3>
        <p>
          Beetlejuice retorna para causar mais caos quando eventos sobrenaturais voltam a abalar a família Deetz.
        </p>
      </div>

    </div>
  </div>

  <script>
    function mostrarTrailer() {
      var trailer = document.getElementById("areaTrailer");
      trailer.style.display = "block";
    }
  </script>

</body>
</html>
