<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background: url(fundo.png) no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            color: #fff;
        }

        .form-control {
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .form-control:focus {
            background: rgba(255,255,255,0.3);
            box-shadow: none;
            color: #fff;
        }

        .btn-login {
            background-color: #f8c291;
            border: none;
            color: #000;
            font-weight: 600;
            border-radius: 30px;
        }

        .btn-login:hover {
            background-color: #f6b48f;
        }

        .social-btn {
            background: #fff;
            color: #000;
            font-weight: 500;
        }

        .login-title {
            font-size: 24px;
            font-weight: bold;
        }

        .small-link {
            font-size: 14px;
            color: #fff;
            text-decoration: none;
        }

        .small-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-card text-center">
        <div class="login-title mb-3">Login </div>
        <p class="mb-4">Tem uma conta?</p>

        <form>
            <div class="mb-3">
                <input type="text" class="form-control rounded-pill" placeholder="Username">
            </div>

            <div class="mb-3">
                <input type="password" class="form-control rounded-pill" placeholder="Password">
            </div>
            <a class="btn btn-primary" href="netflix.html" role="button" 
            style="background-color: rgb(5, 5, 2); border-color: rgb(0, 0, 0); font-size: 18px; padding: 10px 50px;">
            ENTRAR
            </a>

            <div class="d-flex justify-content-between mb-3">
                <div>
                    <input type="checkbox" id="remember">
                    <label for="remember" class="small">não perguntar novamente</label>
                </div>
                <a href="#" class="small-link">Lembre de mim</a>
            </div>

            <div class="text-center mb-3">— Ou faça login com —</div>

            <div class="d-flex gap-2">
                <button type="button" class="btn social-btn w-50">Google</button>
                <button type="button" class="btn social-btn w-50">Apple ID</button>
            </div>
        </form>
    </div>

</body>
</html>
