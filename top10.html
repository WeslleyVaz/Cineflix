    <style>
        body {
            background-color: #ffffff;
            color: rgb(0, 0, 136);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            padding: 20px;
        }

        .titulo {
            font-size: 24px;
            margin-bottom: 10px;
        }

        /* Carrossel horizontal */
        .carrossel {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .carrossel::-webkit-scrollbar {
            display: none;
            /* esconde a barra de rolagem */
        }

        /* Cada item do carrossel */
        .item {
            position: relative;
            min-width: 200px;
            height: 300px;
            border-radius: 5px;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Zoom ao passar o mouse */
        .item:hover {
            transform: scale(1.1);
            cursor: pointer;
            z-index: 10;
        }

        /* Título sobre a imagem */
        .item .titulo-filme {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 5px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            text-align: center;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .item:hover .titulo-filme {
            opacity: 1;
        }
    </style>
    </head>
